# BP分体键盘配置文件
# BP Split Keyboard Configuration

# 蓝牙配置
CONFIG_ZMK_BLE=y

# 分体键盘配置
CONFIG_ZMK_SPLIT=y

# 蓝牙设备名称前缀 (会加上 "BP Keyboard Left/Right")
CONFIG_ZMK_KEYBOARD_NAME="BP Keyboard"

# 蓝牙广播间隔 (ms) - 较低的值响应更快但耗电更多
# 增加间隔以降低功耗
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24

# 启用深度睡眠以节省电量
CONFIG_ZMK_SLEEP=y

# 空闲超时后进入睡眠 (秒) - 缩短以更快进入低功耗状态
CONFIG_ZMK_IDLE_TIMEOUT=60

# 启用电池电量报告
CONFIG_ZMK_BATTERY_REPORTING=y
# 电池报告间隔 (秒) - 增加间隔以降低功耗
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300

# 启用底层调试 (调试时可开启)
# CONFIG_ZMK_DEBUG=y

# USB日志输出 (调试时使用)
# CONFIG_ZMK_USB_LOGGING=y

# 减少KSCAN矩阵扫描间隔以提高响应速度
# CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
# CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# 启用ZMK Studio (可选，用于实时配置)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# 启用蓝牙2M PHY以提高传输效率，降低功耗
CONFIG_BT_CTLR_PHY_2M=y