# This file generates the GitHub Actions matrix.
# 编译配置说明：
# - 带 ZMK Studio 的版本用于调试和实时配置按键
# - 不带 ZMK Studio 的版本用于日常使用，功耗更低
---
include:
  # === nice_nano v1 ===
  # 带 ZMK Studio 版本（调试用）
  - board: nice_nano
    shield: bp_keyboard_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano
    shield: bp_keyboard_right
  # 不带 ZMK Studio 版本（日常使用，低功耗）
  - board: nice_nano
    shield: bp_keyboard_left
    artifact-name: bp_keyboard_left-nice_nano-lowpower
  - board: nice_nano
    shield: bp_keyboard_right
    artifact-name: bp_keyboard_right-nice_nano-lowpower
  # settings_reset
  - board: nice_nano
    shield: settings_reset

  # === nice_nano v2 ===
  # 带 ZMK Studio 版本（调试用）
  - board: nice_nano_v2
    shield: bp_keyboard_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: bp_keyboard_right
  # 不带 ZMK Studio 版本（日常使用，低功耗）
  - board: nice_nano_v2
    shield: bp_keyboard_left
    artifact-name: bp_keyboard_left-nice_nano_v2-lowpower
  - board: nice_nano_v2
    shield: bp_keyboard_right
    artifact-name: bp_keyboard_right-nice_nano_v2-lowpower
  # settings_reset
  - board: nice_nano_v2
    shield: settings_reset
