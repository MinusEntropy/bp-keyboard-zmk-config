# This file generates the GitHub Actions matrix.
# BP分体键盘编译配置
---
include:
  # === nice_nano v1 ===
  - board: nice_nano
    shield: bp_keyboard_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano
    shield: bp_keyboard_right
  - board: nice_nano
    shield: settings_reset

  # === nice_nano v2 ===
  - board: nice_nano_v2
    shield: bp_keyboard_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: bp_keyboard_right
  - board: nice_nano_v2
    shield: settings_reset
